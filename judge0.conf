# Redis connection (points to judge0-redis container)
REDIS_URL=redis://judge0-redis:6379

# How many parallel worker processes
COUNT=5

# Authentication token (set to empty string to disable auth for local dev)
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=

# Enable all languages
ENABLE_WAIT_RESULT=true

# Judge0 internal database  
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=12345678
