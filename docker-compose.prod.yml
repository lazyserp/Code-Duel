services:

  # 1. POSTGRES DATABASE
  postgres:
    image: postgres:15-alpine
    container_name: codeduel-db-prod
    environment:
      POSTGRES_DB: codeduel
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-codeduel}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 2. REDIS DATA STORE
  redis:
    image: redis:7-alpine
    container_name: codeduel-redis-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 3. KAFKA BROKER (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: codeduel-kafka-prod
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 4. CODE EXECUTION SANDBOX DAEMON
  codeduel-executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    container_name: codeduel-executor-prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - executor_temp_prod:/tmp/executions
    environment:
      - DEFAULT_TIME_LIMIT=10
      - DEFAULT_MEMORY_LIMIT=256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 5. SPRING BOOT BACKEND MONOLITH
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeduel-backend-prod
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/codeduel
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-12345678}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EXECUTOR_URL=http://codeduel-executor:3000
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      codeduel-executor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 6. REACT FRONTEND WEB SERVER
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeduel-frontend-prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_prod:
  executor_temp_prod:
