
# Runs 4 services total:
#   APP:      postgres, redis, kafka
#   EXECUTOR: codeduel-executor (replaces Judge0)


services:

  # APP'S DATABASE
  # Stores: users, matches, submissions, problems, AI reviews, notifications
  # Host port 5432 → Container port 5432

  postgres:
    image: postgres:15-alpine
    container_name: codeduel-db
    environment:
      POSTGRES_DB: codeduel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345678"
    ports:
      - "5432:5432"
    volumes:
      # Named volume: data persists even if the container is removed
      - postgres_data:/var/lib/postgresql/data


  #APP'S REDIS
  # Used for: matchmaking queues, live match state, leaderboard sorted set,
  #           online status, AI hint cache
  # Host port 6379 → Container port 6379
  redis:
    image: redis:7-alpine
    container_name: codeduel-redis
    ports:
      - "6379:6379"


  # KAFKA (KRaft mode — no Zookeeper needed)
  # Used for: async event bus between modules
  # Events: MatchCreated, SubmissionReceived, SubmissionEvaluated, MatchFinished
  #
  # WHY SO MANY LISTENERS?
  #   PLAINTEXT (port 29092)     → used by other containers inside Docker network
  #   CONTROLLER (port 29093)    → internal Kafka controller election (KRaft)
  #   PLAINTEXT_HOST (port 9092) → used by  Spring Boot app running on the host

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: codeduel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      # This node acts as both a broker AND a controller (single-node KRaft setup)
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

      # Required fixed cluster ID for KRaft mode
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # Set to 1 because we only have 1 broker (dev only use 3 in production)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1


  # CODE EXECUTION ENGINE (replaces Judge0)
  # FastAPI service that spawns ephemeral Docker containers to run user code.
  # Spring Boot app calls http://localhost:2358/execute — same port as Judge0 was on.
  # Mounts the Docker socket so it can spawn sibling containers on the host.
  codeduel-executor:
    build: ./executor
    container_name: codeduel-executor
    ports:
      - "2358:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - executor_temp:/tmp/executions
    environment:
      - DEFAULT_TIME_LIMIT=10
      - DEFAULT_MEMORY_LIMIT=256
    depends_on:
      - postgres
    restart: unless-stopped


# VOLUMES
# Named volumes persist data on disk even when containers are stopped/removed.
# app data and Judge0's data are in separate volumes — never mixed.

volumes:
  postgres_data:   # CodeDuel app data (users, matches, submissions)
  executor_temp:   # Shared temp space for code execution sandboxes
