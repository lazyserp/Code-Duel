server {
    listen 80;
    server_name localhost;

    # 1. Serve static files and fallback to index.html for React Router
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy REST API calls to the Spring Boot backend
    location /api/ {
        # 'backend' is the service name of the Spring Boot app in docker-compose.prod.yml
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy WebSocket connections to the Spring Boot backend
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Custom error pages
    error_page 500 502 503 504 /55x.html;
    location = /55x.html {
        root /usr/share/nginx/html;
    }
}
