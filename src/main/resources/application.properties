spring.application.name=codeduel

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codeduel}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250655368566D5970}
jwt.expiration=${JWT_EXPIRATION:86400000}


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Spring AI Configuration for NVIDIA NIM (OpenAI Compatible)
spring.ai.openai.base-url=https://integrate.api.nvidia.com/v1
spring.ai.openai.api-key=${NVIDIA_API_KEY:mock-key}


spring.ai.openai.chat.options.model=mistralai/mistral-nemotron
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.top-p=0.7
spring.ai.openai.chat.options.max-tokens=1024


executor.url=http://localhost:2358